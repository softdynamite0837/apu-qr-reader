<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRリーダー - APU Campus</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', sans-serif; background: #1A2A3A; min-height: 100vh; color: white; }
  .top-bar {
    background: #1E2761; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .top-bar-title { font-size: 14px; font-weight: 700; }
  .gps-info { font-size: 10px; color: #80CBC4; }

  .scanner-wrap {
    padding: 16px; display: flex; flex-direction: column;
    align-items: center; gap: 14px;
  }
  #reader-box {
    width: 100%; max-width: 340px; border-radius: 12px; overflow: hidden;
    border: 2px solid #028090;
  }
  .hint { font-size: 13px; color: #80CBC4; text-align: center; }

  /* 結果表示 */
  #result-area { display: none; padding: 16px; }
  .result-card {
    border-radius: 16px; padding: 24px; text-align: center;
    max-width: 400px; margin: 0 auto;
  }
  .result-card.success { background: #1A6630; border: 2px solid #02C39A; }
  .result-card.failure { background: #7A1A1A; border: 2px solid #FF6B6B; }
  .result-icon  { font-size: 56px; margin-bottom: 12px; }
  .result-label { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
  .result-name  { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .result-info  { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
  .result-time  { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 12px; }
  .btn-retry {
    margin-top: 20px; padding: 12px 32px;
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    border-radius: 10px; color: white; font-size: 14px; cursor: pointer; width: 100%;
  }

  .log-section { padding: 0 16px 16px; }
  .log-title { font-size: 13px; font-weight: 600; color: #80CBC4; margin-bottom: 8px; }
  .log-item {
    background: rgba(255,255,255,0.05); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 6px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .log-name   { font-size: 13px; font-weight: 600; }
  .log-time   { font-size: 11px; color: #80CBC4; }
  .log-ok     { color: #02C39A; font-size: 11px; font-weight: 600; }
  .log-ng     { color: #FF6B6B; font-size: 11px; font-weight: 600; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-title">📷 QRリーダー（出席管理）</div>
  <div class="gps-info" id="gps-status">GPS取得中...</div>
</div>

<!-- スキャン画面 -->
<div id="scan-area">
  <div class="scanner-wrap">
    <div id="reader-box"></div>
    <div class="hint">学生のスマホのQRコードをカメラに映してください</div>
  </div>

  <div class="log-section">
    <div class="log-title">認証ログ（直近）</div>
    <div id="log-list"></div>
  </div>
</div>

<!-- 結果画面 -->
<div id="result-area">
  <div class="result-card" id="result-card">
    <div class="result-icon"  id="result-icon"></div>
    <div class="result-label" id="result-label"></div>
    <div class="result-name"  id="result-name"></div>
    <div class="result-info"  id="result-info"></div>
    <div class="result-time"  id="result-time"></div>
    <button class="btn-retry" onclick="backToScan()">次の学生をスキャン</button>
  </div>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxMdqmF0NJq-4ml5koIhiieV6uCWzwWMHfQLTUbzyt8UXlkncKQc8JMJyutk0Au4Y4E/exec';
  let readerLat = null, readerLon = null;
  let logs = [];
  let scanner = null;

  // GPS取得
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(pos => {
      readerLat = pos.coords.latitude;
      readerLon = pos.coords.longitude;
      const el = document.getElementById('gps-status');
      if (el) el.textContent = `📍 GPS OK（±${Math.round(pos.coords.accuracy)}m）`;
    }, () => {
      document.getElementById('gps-status').textContent = 'GPS取得失敗';
    });
  }

  // QRスキャナー起動
window.onload = function() {
  scanner = new Html5QrcodeScanner('reader-box', {
    fps: 10,
    qrbox: { width: 250, height: 250 },
    aspectRatio: 1.0
  });
  scanner.render(onScanSuccess, onScanError);
};

function onScanSuccess(decodedText) {
  try { scanner.pause(); } catch(e) {}

  let qrData;
  try {
    qrData = JSON.parse(decodedText);
  } catch(e) {
    showResult(false, 'QRデータ読み取りエラー', '', '', '');
    return;
  }

  const payload = {
    action: 'verify_with_location',
    qr_data: decodedText,
    reader_lat: readerLat || 0,
    reader_lon: readerLon || 0,
    location_required: false
  };

  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(res => {
    if (res && res.success) {
      showResult(true, '認証成功', res.name,
        (res.department || '') + ' ' + (res.year || '') + '年',
        res.timestamp || '');
      addLog(res.name, res.student_id, '成功');
    } else {
      showResult(false, (res && res.error) || '認証失敗',
        (qrData && qrData.id) || '', '', '');
      addLog((qrData && qrData.id) || '不明',
        (qrData && qrData.id) || '', '失敗');
    }
  })
  .catch(err => {
    showResult(false, 'サーバーエラー: ' + err.message, '', '', '');
  });
}
  function onScanError() {} // エラーは無視

  function showResult(success, label, name, info, time) {
    document.getElementById('scan-area').style.display   = 'none';
    document.getElementById('result-area').style.display = 'block';
    const card = document.getElementById('result-card');
    card.className = 'result-card ' + (success ? 'success' : 'failure');
    document.getElementById('result-icon').textContent  = success ? '✅' : '❌';
    document.getElementById('result-label').textContent = label;
    document.getElementById('result-name').textContent  = name;
    document.getElementById('result-info').textContent  = info;
    document.getElementById('result-time').textContent  = time;

    // 3秒後に自動で次へ
    setTimeout(backToScan, 3000);
  }

function backToScan() {
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('scan-area').style.display   = 'block';
  try { scanner.resume(); } catch(e) {
    scanner.render(onScanSuccess, onScanError);
  }
}

  function addLog(name, id, result) {
    const now = new Date().toLocaleTimeString('ja-JP');
    logs.unshift({ name, id, result, time: now });
    if (logs.length > 10) logs.pop();
    renderLog();
  }

  function renderLog() {
    const el = document.getElementById('log-list');
    if (!logs.length) { el.innerHTML = '<div style="color:#5A7090;font-size:12px">まだ認証記録がありません</div>'; return; }
    el.innerHTML = logs.map(l => `
      <div class="log-item">
        <div>
          <div class="log-name">${l.name}（${l.id}）</div>
          <div class="log-time">${l.time}</div>
        </div>
        <div class="${l.result === '成功' ? 'log-ok' : 'log-ng'}">${l.result}</div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
